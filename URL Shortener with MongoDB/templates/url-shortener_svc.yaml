apiVersion: v1
kind: Service
metadata:
  name: url-shortener-service
  namespace: {{ .Values.namespace }}
spec:
  type: NodePort
  selector:
    app: url-shortener
  ports:
    - protocol: TCP
      port: {{ .Values.app.port }}
      targetPort: {{ .Values.app.port }}
      nodePort: {{ .Values.app.nodePort }}
